<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Picross — Mural Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#0f1a2e}
body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1a2e;color:#f0ece0;overscroll-behavior:none}

/* safe area */
:root{
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --teal:#4ecdc4;--amber:#f5a623;--red:#e74c3c;
}

/* ══ MENU ══════════════════════════════════════════════════════ */
#main-menu{display:flex;flex-direction:column;min-height:100dvh;background:#0f1a2e}
#menu-header{
  padding: calc(var(--safe-top) + 20px) 20px 16px;
  border-bottom:1px solid #1e3050;flex-shrink:0
}
#menu-header h1{font-size:20px;font-weight:700;letter-spacing:0.1em;color:var(--teal);margin-bottom:3px}
#menu-header p{font-size:12px;color:#8394a8;line-height:1.5}
#menu-body{padding:16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#menu-body h2{font-size:10px;color:#8394a8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
#pack-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pack-card{background:#0a1220;border:1px solid #1e3050;border-radius:10px;overflow:hidden;position:relative;active:scale(0.97)}
.pack-card:active{opacity:0.85}
.pack-thumb-wrap{width:100%;aspect-ratio:1;position:relative;background:#050d1a;overflow:hidden}
.pack-thumb-wrap canvas{width:100%;height:100%;display:block;image-rendering:pixelated;object-fit:contain}
.pack-fog{position:absolute;inset:0;display:grid;gap:1px;padding:1px}
.pack-badge{position:absolute;top:7px;right:7px;background:var(--teal);color:#0a1220;font-size:8px;font-weight:800;padding:2px 6px;border-radius:8px;z-index:2;letter-spacing:0.05em}
.pack-body{padding:10px}
.pack-size-tag{display:inline-block;background:#1e3050;color:#8394a8;font-size:9px;padding:2px 6px;border-radius:3px;margin-bottom:5px}
.pack-body h3{font-size:13px;font-weight:600;color:#f0ece0;margin-bottom:2px}
.pack-body .sub{font-size:10px;color:#8394a8;line-height:1.4;margin-bottom:7px}
.pack-progress{height:2px;background:#1e3050;border-radius:1px;overflow:hidden;margin-bottom:4px}
.pack-progress-fill{height:100%;border-radius:1px;transition:width 0.4s}
.pack-pct{font-size:10px;color:#8394a8}
#menu-footer{
  padding:12px 16px calc(var(--safe-bot) + 12px);
  border-top:1px solid #1e3050;display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
#menu-footer .total{font-size:11px;color:#8394a8}
#menu-footer .total span{color:var(--teal);font-weight:600}
.ghost-btn{padding:7px 14px;border-radius:6px;border:1px solid #2a3f5a;background:transparent;color:#8394a8;font-size:12px}

/* ══ GAME SCREEN ═══════════════════════════════════════════════ */
#game-screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}

/* topbar */
#topbar{
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-top) + 8px) 14px 8px;
  background:#0a1220;border-bottom:1px solid #1e3050;flex-shrink:0
}
#back-btn{padding:6px 12px;border-radius:6px;border:1px solid #2a3f5a;background:transparent;color:#8394a8;font-size:13px}
#topbar-title{font-size:13px;font-weight:700;color:var(--teal);flex:1;letter-spacing:0.06em}
#puzzle-label{font-size:11px;color:#8394a8;text-align:right;max-width:120px;line-height:1.2}

/* puzzle area — scrollable in both directions */
#puzzle-area{
  flex:1;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  background:#0f1a2e;
  position:relative;
}
/* inner wrapper adds padding so grid is centred with room to scroll */
#puzzle-inner{
  display:inline-block;
  padding:14px 20px 14px 12px;
  min-width:100%;
  min-height:100%;
}
#clue-grid{
  display:grid;
  flex-shrink:0;
  user-select:none;
}
.cell{
  border:1px solid #1e3050;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  user-select:none;position:relative;touch-action:none;
}
.cell.filled{border-color:#c47d0a}
.cell.filled.mural-col{transition:background 0.35s ease, border-color 0.35s ease}
@keyframes cellReveal{0%{transform:scale(1.18);opacity:0.5}100%{transform:scale(1);opacity:1}}
.cell.reveal{animation:cellReveal 0.3s ease forwards}
.cell.marked{background:#3a0808;border-color:#8b1a1a}
.cell.marked::after{content:'✕';font-weight:800;color:var(--red);position:absolute;line-height:1}
.cell.fbr{border-right:2px solid #2e4a6a}
.cell.fbb{border-bottom:2px solid #2e4a6a}
.row-clue{display:flex;align-items:center;justify-content:flex-end;gap:2px;padding:0 3px;font-family:'Courier New',monospace;color:#c8d8e8;flex-shrink:0}
.col-clue{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:3px 0;font-family:'Courier New',monospace;color:#c8d8e8;flex-shrink:0}
.clue-num{line-height:1.2;font-weight:700;letter-spacing:-0.02em}
.row-clue.clue-done,.col-clue.clue-done{opacity:0.28;transition:opacity 0.4s ease}
.row-clue.clue-done .clue-num,.col-clue.clue-done .clue-num{color:#8394a8}

/* bottom panel */
#bottom-panel{
  background:#0a1220;border-top:1px solid #1e3050;flex-shrink:0;
  padding:8px 12px calc(var(--safe-bot) + 8px);
  display:flex;flex-direction:column;gap:7px;
}

/* mural strip */
#mural-row{display:flex;align-items:center;gap:8px}
#mural-grid-small{display:grid;gap:2px;flex-shrink:0}
.mc{border-radius:2px;position:relative;overflow:hidden;touch-action:manipulation}
.mc.locked{background:#111e30;border:1px solid #1a2d42;display:flex;align-items:center;justify-content:center}
.mc.active-p{border:2px solid var(--teal)!important}
.mc.solved{border:1px solid #1a2d42}
#mural-info{flex:1;min-width:0}
#mural-pack-name{font-size:11px;font-weight:600;margin-bottom:2px}
#mural-stat{font-size:10px;color:#8394a8}
#pb-wrap{height:2px;background:#1a2a40;border-radius:1px;overflow:hidden;margin-top:4px}
#pb{height:100%;border-radius:1px;transition:width 0.4s}

/* controls row */
#controls-row{display:flex;gap:6px;align-items:center}
.ctrl{
  padding:9px 0;border-radius:7px;border:1px solid #2a3f5a;
  background:#0f1a2e;color:#f0ece0;font-size:12px;
  text-align:center;flex:1;font-weight:500;
}
.ctrl.fill-on{background:var(--teal);color:#0a1220;border-color:var(--teal);font-weight:700}
.ctrl.mark-on{background:#8b1a1a;color:#f0ece0;border-color:var(--red);font-weight:700}
#hint-box{font-size:10px;color:#8394a8;line-height:1.45;min-height:0}

/* solved puzzle view */
#solved-view{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:20px;gap:16px;background:#0f1a2e;
}
#solved-canvas-wrap{
  border-radius:10px;overflow:hidden;
  box-shadow:0 0 0 2px var(--teal), 0 8px 32px rgba(78,205,196,0.15);
}
#solved-canvas{image-rendering:pixelated;display:block}
#solved-title{font-size:15px;font-weight:600;color:var(--teal);letter-spacing:0.05em;text-align:center}
#solved-sub{font-size:12px;color:#8394a8;text-align:center}
#solved-back-btn{
  padding:10px 28px;border-radius:8px;border:1px solid #2a3f5a;
  background:#0a1220;color:#f0ece0;font-size:13px;font-weight:500;
}
#hint-overlay{display:none;position:fixed;inset:0;background:rgba(8,15,28,0.93);z-index:100;align-items:flex-end;justify-content:center;padding:0}
#hint-overlay.show{display:flex}
#hint-sheet{background:#0f1a2e;border:1px solid #1e3050;border-bottom:none;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:0 0 calc(var(--safe-bot) + 8px)}
#hint-sheet-handle{width:36px;height:4px;background:#2a3f5a;border-radius:2px;margin:10px auto 0}
#hint-sheet-title{font-size:13px;font-weight:600;color:var(--teal);padding:10px 16px 6px;letter-spacing:0.04em}
#hint-sheet-sub{font-size:11px;color:#8394a8;padding:0 16px 10px;border-bottom:1px solid #1e3050}
#hint-type-row{display:flex;gap:8px;padding:12px 16px 8px}
.hint-type-btn{flex:1;padding:9px 0;border-radius:7px;border:1px solid #2a3f5a;background:#0a1220;color:#8394a8;font-size:13px;font-weight:500;text-align:center}
.hint-type-btn.selected{border-color:var(--teal);background:#0d2a28;color:var(--teal);font-weight:700}
#hint-picker-label{font-size:10px;color:#8394a8;padding:0 16px 6px;text-transform:uppercase;letter-spacing:0.08em}
#hint-picker{display:grid;gap:4px;padding:0 16px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hint-pick-btn{padding:8px 10px;border-radius:6px;border:1px solid #1e3050;background:#0a1220;color:#f0ece0;font-size:12px;text-align:left;display:flex;justify-content:space-between;align-items:center}
.hint-pick-btn:active{background:#1a2a40}
.hint-pick-btn .hclue{font-family:'Courier New',monospace;font-size:11px;color:#8394a8}
.hint-pick-btn.already{opacity:0.4}
#hint-cancel{margin:10px 16px 0;padding:10px;border-radius:8px;border:1px solid #2a3f5a;background:transparent;color:#8394a8;font-size:13px;width:calc(100% - 32px);text-align:center}

/* ══ SUCCESS OVERLAY ═══════════════════════════════════════════ */
.sw{display:none;position:fixed;inset:0;background:rgba(8,15,28,0.93);z-index:100;align-items:center;justify-content:center;padding:20px}
.sw.show{display:flex}
#sb{background:#0f1a2e;border:1px solid var(--teal);border-radius:14px;padding:28px 24px;text-align:center;width:100%;max-width:320px}
#sb h2{color:var(--teal);font-size:20px;margin-bottom:8px}
#sb p{color:#8394a8;font-size:12px;margin-bottom:20px;line-height:1.6}
.sbtn-row{display:flex;gap:8px}
.sbtn{flex:1;padding:11px 0;border-radius:8px;border:none;background:var(--amber);color:#0a1220;font-weight:700;font-size:14px}
.sbtn.alt{background:transparent;border:1px solid #2a3f5a;color:#8394a8;font-weight:400}
</style>
</head>
<body>

<!-- ══ MAIN MENU ══ -->
<div id="main-menu">
  <div id="menu-header">
    <h1>PICROSS</h1>
    <p>Solve nonogram puzzles to reveal pixel murals. No timers, no penalties.</p>
  </div>
  <div id="menu-body">
    <h2>Choose a pack</h2>
    <div id="pack-cards"></div>
  </div>
  <div id="menu-footer">
    <div class="total">Solved: <span id="menu-total">0</span> total</div>
    <button class="ghost-btn" onclick="resetAll()">Reset all</button>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game-screen">
  <div id="topbar">
    <button id="back-btn" onclick="goMenu()">← Menu</button>
    <div id="topbar-title">PICROSS</div>
    <div id="puzzle-label" id="puzzle-label"></div>
  </div>

  <div id="puzzle-area">
    <div id="puzzle-inner">
      <div id="clue-grid"></div>
    </div>
  </div>

  <!-- shown instead of puzzle-area when puzzle is already solved -->
  <div id="solved-view">
    <div id="solved-canvas-wrap"><canvas id="solved-canvas"></canvas></div>
    <div id="solved-title"></div>
    <div id="solved-sub"></div>
    <div id="solved-back-btn" onclick="pickNextPuzzle()">Next puzzle →</div>
  </div>

  <div id="bottom-panel">
    <!-- mural strip -->
    <div id="mural-row">
      <div id="mural-grid-small"></div>
      <div id="mural-info">
        <div id="mural-pack-name"></div>
        <div id="mural-stat"></div>
        <div id="pb-wrap"><div id="pb"></div></div>
      </div>
    </div>
    <!-- mode + util buttons -->
    <div id="controls-row">
      <div class="ctrl fill-on" id="btn-fill" onclick="setMode('fill')">✦ Fill</div>
      <div class="ctrl" id="btn-mark" onclick="setMode('mark')">✕ Mark</div>
      <div class="ctrl" style="flex:0.7" onclick="clearPuzzle()">↺</div>
      <div class="ctrl" style="flex:0.7" onclick="openHint()">💡</div>
    </div>
  </div>
</div>

<!-- ══ HINT OVERLAY ══ -->
<div id="hint-overlay" onclick="closeHint(event)">
  <div id="hint-sheet">
    <div id="hint-sheet-handle"></div>
    <div id="hint-sheet-title">Solve a row or column</div>
    <div id="hint-sheet-sub">Choose a row or column and it will be filled in for you.</div>
    <div id="hint-type-row">
      <div class="hint-type-btn selected" id="hbtn-row" onclick="setHintType('row')">Rows</div>
      <div class="hint-type-btn" id="hbtn-col" onclick="setHintType('col')">Columns</div>
    </div>
    <div id="hint-picker-label">Pick one</div>
    <div id="hint-picker"></div>
    <div id="hint-cancel" onclick="closeHint()">Cancel</div>
  </div>
</div>

<!-- ══ SUCCESS ══ -->
<div class="sw" id="soverlay">
  <div id="sb">
    <h2 id="stitle">Puzzle complete!</h2>
    <p id="smsg"></p>
    <div class="sbtn-row">
      <button class="sbtn alt" onclick="goMenu()">Menu</button>
      <button class="sbtn" onclick="closeSuccess()">Continue →</button>
    </div>
  </div>
</div>

function getClues(g){
  const rows=[],cols=[];
  for(let r=0;r<GRID;r++){const cl=[];let n=0;for(let c=0;c<GRID;c++){if(g[r][c])n++;else if(n){cl.push(n);n=0}}if(n)cl.push(n);rows.push(cl.length?cl:[0]);}
  for(let c=0;c<GRID;c++){const cl=[];let n=0;for(let r=0;r<GRID;r++){if(g[r][c])n++;else if(n){cl.push(n);n=0}}if(n)cl.push(n);cols.push(cl.length?cl:[0]);}
  return{rows,cols};
}

const PACK_PAT={'dragon':DRAGON_PAT,'gods':GODS_PAT,'forest':FOREST_PAT,'ocean':OCEAN_PAT,'norse':NORSE_PAT};
function tileColor(pack,tileIdx,filled,pixRow,pixCol){
  const pats=PACK_PAT[pack.id];
  if(pats&&pixRow!==undefined){
    const t=pats[tileIdx];
    if(t){return pack.pal[t[pixRow*15+pixCol]];}
  }
  const t=pack.tiles[tileIdx]||[0,1];
  return pack.pal[filled?t[1]:t[0]];
}

/* ── state ── */
let G={activePack:0,mode:'fill',packs:{}};
function initPack(pi){
  const p=PACKS[pi];if(G.packs[p.id])return;
  G.packs[p.id]={puzzles:Array.from({length:p.dim*p.dim},(_,i)=>{const pat=genPat(pi*200+i);return{pat,clues:getClues(pat),player:Array.from({length:GRID},()=>Array(GRID).fill(0)),solved:false};}),current:0};
}
const pd=()=>PACKS[G.activePack];
const ps=()=>G.packs[pd().id];
const puzz=()=>ps().puzzles[ps().current];
function tryLoad(){try{const d=localStorage.getItem('picross_mobile_v1');if(d){const sv=JSON.parse(d);G.activePack=sv.ap||0;if(sv.packs)Object.assign(G.packs,sv.packs);}}catch(e){}}
function saveG(){try{localStorage.setItem('picross_mobile_v1',JSON.stringify({ap:G.activePack,packs:G.packs}));}catch(e){}}

/* ── menu ── */
function drawThumb(pack,st,cv){
  const d=pack.dim;cv.width=d*15;cv.height=d*15;
  const ctx=cv.getContext('2d');ctx.fillStyle=pack.pal[0];ctx.fillRect(0,0,cv.width,cv.height);
  const pats=PACK_PAT[pack.id];
  for(let i=0;i<d*d;i++){
    const col=i%d,row=Math.floor(i/d),pu=st.puzzles[i];if(!pu.solved)continue;
    for(let r=0;r<15;r++)for(let c=0;c<15;c++){
      const colour=pats&&pats[i]?pack.pal[pats[i][r*15+c]]:tileColor(pack,i,pu.pat[r][c]===1,r,c);
      ctx.fillStyle=colour;ctx.fillRect(col*15+c,row*15+r,1,1);
    }
  }
}
function renderMenu(){
  const cards=document.getElementById('pack-cards');cards.innerHTML='';
  let tot=0;
  PACKS.forEach((p,i)=>{
    initPack(i);const st=G.packs[p.id];
    const done=st.puzzles.filter(x=>x.solved).length,total=p.dim*p.dim;tot+=done;
    const pct=Math.round(done/total*100);
    const card=document.createElement('div');card.className='pack-card'+(done===total?' complete':'');
    if(done>0)card.style.borderColor=p.accent+'88';
    if(done===total){const b=document.createElement('div');b.className='pack-badge';b.textContent='DONE';card.appendChild(b);}
    const tw=document.createElement('div');tw.className='pack-thumb-wrap';
    const cv=document.createElement('canvas');cv.style.cssText='width:100%;height:100%;display:block;image-rendering:pixelated';
    drawThumb(p,st,cv);tw.appendChild(cv);
    const fog=document.createElement('div');fog.className='pack-fog';
    fog.style.gridTemplateColumns=`repeat(${p.dim},1fr)`;fog.style.gridTemplateRows=`repeat(${p.dim},1fr)`;
    for(let j=0;j<total;j++){const lc=document.createElement('div');if(!st.puzzles[j].solved)lc.style.background='rgba(4,8,18,0.62)';fog.appendChild(lc);}
    tw.appendChild(fog);card.appendChild(tw);
    const body=document.createElement('div');body.className='pack-body';
    const tag=document.createElement('span');tag.className='pack-size-tag';tag.textContent=p.desc;body.appendChild(tag);
    const h3=document.createElement('h3');h3.textContent=p.name;body.appendChild(h3);
    const bar=document.createElement('div');bar.className='pack-progress';
    const fill=document.createElement('div');fill.className='pack-progress-fill';fill.style.cssText=`width:${pct}%;background:${p.accent}`;bar.appendChild(fill);body.appendChild(bar);
    const pctEl=document.createElement('div');pctEl.className='pack-pct';
    pctEl.textContent=done===0?'Not started':done===total?'Complete!':pct+'% — '+done+'/'+total;body.appendChild(pctEl);
    card.appendChild(body);
    card.addEventListener('click',()=>openPack(i));
    cards.appendChild(card);
  });
  document.getElementById('menu-total').textContent=tot;
}
function resetAll(){if(!confirm('Reset ALL progress?'))return;G.packs={};PACKS.forEach((_,i)=>initPack(i));saveG();renderMenu();}
function goMenu(){document.getElementById('main-menu').style.display='flex';document.getElementById('game-screen').style.display='none';renderMenu();}
function openPack(pi){
  G.activePack=pi;initPack(pi);
  const st=ps();const next=st.puzzles.findIndex(p=>!p.solved);if(next>=0)st.current=next;
  document.getElementById('main-menu').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('mural-pack-name').textContent=pd().name;
  document.getElementById('mural-pack-name').style.color=pd().accentLight;
  document.getElementById('pb').style.background=pd().accent;
  renderMural();renderPuzzle();updateStats();saveG();
  const solved=puzz().solved;
  document.getElementById('controls-row').style.opacity=solved?'0.35':'1';
  document.getElementById('controls-row').style.pointerEvents=solved?'none':'auto';
}

/* ── mode ── */
function setMode(m){
  G.mode=m;
  document.getElementById('btn-fill').className='ctrl'+(m==='fill'?' fill-on':'');
  document.getElementById('btn-mark').className='ctrl'+(m==='mark'?' mark-on':'');
}

/* ── touch input ── */
let touching=false,touchAction=null;

/* ── clue state fading ── */
function getRunLengths(arr){
  const runs=[];let n=0;
  for(let i=0;i<arr.length;i++){if(arr[i]===1)n++;else if(n){runs.push(n);n=0;}}
  if(n)runs.push(n);
  return runs.length?runs:[0];
}

function updateClueStates(){
  const pu=puzz(),cl=pu.clues;
  for(let r=0;r<GRID;r++){
    const playerRow=pu.player[r];
    const runs=getRunLengths(playerRow);
    const matches=JSON.stringify(runs)===JSON.stringify(cl.rows[r]);
    const el=document.getElementById(`clue-row-${r}`);
    if(el)el.classList.toggle('clue-done',matches);
  }
  for(let c=0;c<GRID;c++){
    const col=pu.player.map(row=>row[c]);
    const runs=getRunLengths(col);
    const matches=JSON.stringify(runs)===JSON.stringify(cl.cols[c]);
    const el=document.getElementById(`clue-col-${c}`);
    if(el)el.classList.toggle('clue-done',matches);
  }
}

function applyCell(r,c,init){
  const pg=puzz().player,cur=pg[r][c];
  if(init){
    touchAction=G.mode==='fill'?(cur===1?'clear':'fill'):(cur===2?'clear':'mark');
  }
  if(G.mode==='fill')pg[r][c]=touchAction==='fill'?1:(touchAction==='clear'&&cur===1?0:cur);
  else pg[r][c]=touchAction==='mark'?2:(touchAction==='clear'&&cur===2?0:cur);
  renderCell(r,c,false);updateClueStates();saveG();
}

/* cellsFromTouch no longer needed */

/* ── puzzle render ── */
function computeCellSize(){ return 30; }

function renderPuzzle(){
  const p=pd(),st=ps(),pu=puzz(),pidx=st.current;
  const lbl=document.getElementById('puzzle-label');
  if(lbl)lbl.textContent=`${pidx+1}. ${p.names[pidx]||'Puzzle '+(pidx+1)}`;

  if(pu.solved){
    // show the completed tile view, hide the interactive grid
    document.getElementById('puzzle-area').style.display='none';
    document.getElementById('solved-view').style.display='flex';

    // draw the completed tile at a nice size
    const area=document.getElementById('solved-view');
    const size=Math.min(area.offsetWidth||280, 280);
    const cv=document.getElementById('solved-canvas');
    cv.width=15;cv.height=15;
    cv.style.width=size+'px';cv.style.height=size+'px';
    const ctx=cv.getContext('2d');
    const pats=PACK_PAT[p.id];
    for(let r=0;r<15;r++)for(let c=0;c<15;c++){
      // use hand-drawn pixel art pattern directly — ignore player fill state
      const col=pats&&pats[pidx]?p.pal[pats[pidx][r*15+c]]:tileColor(p,pidx,pu.pat[r][c]===1,r,c);
      ctx.fillStyle=col;
      ctx.fillRect(c,r,1,1);
    }

    document.getElementById('solved-title').textContent=p.names[pidx]||'Puzzle '+(pidx+1);
    const total=p.dim*p.dim;
    const done=st.puzzles.filter(x=>x.solved).length;
    document.getElementById('solved-sub').textContent=done===total?'Pack complete! 🎉':`${total-done} puzzle${total-done===1?'':'s'} remaining`;
    const nextBtn=document.getElementById('solved-back-btn');
    const nextIdx=st.puzzles.findIndex(p=>!p.solved);
    nextBtn.style.display=nextIdx>=0?'block':'none';
    return;
  }

  // unsolved — show interactive grid
  document.getElementById('puzzle-area').style.display='block';
  document.getElementById('solved-view').style.display='none';

  const cl=pu.clues;
  const maxR=Math.max(...cl.rows.map(r=>r.length));
  const maxC=Math.max(...cl.cols.map(c=>c.length));
  const sz=computeCellSize();
  const fs=Math.max(9,Math.floor(sz*0.5));
  const cw=maxR*(fs+3)+4;
  const ch=maxC*(fs+2)+4;

  const gc=document.getElementById('clue-grid');
  gc.innerHTML='';
  gc.style.cssText=`display:grid;grid-template-columns:${cw}px repeat(${GRID},${sz}px);grid-template-rows:${ch}px repeat(${GRID},${sz}px)`;

  gc.appendChild(Object.assign(document.createElement('div'),{style:`grid-column:1;grid-row:1`}));

  for(let c=0;c<GRID;c++){
    const el=document.createElement('div');el.className='col-clue';
    el.id=`clue-col-${c}`;
    el.style.cssText=`grid-column:${c+2};grid-row:1;height:${ch}px;font-size:${fs}px`;
    cl.cols[c].forEach(n=>{const s=document.createElement('span');s.className='clue-num';s.textContent=n;el.appendChild(s);});
    el.addEventListener('click',()=>hlCol(c));gc.appendChild(el);
  }

  for(let r=0;r<GRID;r++){
    const el=document.createElement('div');el.className='row-clue';
    el.id=`clue-row-${r}`;
    el.style.cssText=`grid-column:1;grid-row:${r+2};width:${cw}px;font-size:${fs}px`;
    cl.rows[r].forEach(n=>{const s=document.createElement('span');s.className='clue-num';s.textContent=n;el.appendChild(s);});
    el.addEventListener('click',()=>hlRow(r));gc.appendChild(el);

    for(let c=0;c<GRID;c++){
      const cell=document.createElement('div');
      cell.id=`c-${r}-${c}`;
      cell.dataset.r=r;cell.dataset.c=c;
      cell.style.cssText=`grid-column:${c+2};grid-row:${r+2};font-size:${Math.floor(sz*0.55)}px`;

      // touch draw
      cell.addEventListener('touchstart',e=>{e.preventDefault();touching=true;applyCell(r,c,true);},{passive:false});
      cell.addEventListener('touchmove',e=>{
        e.preventDefault();
        if(!touching)return;
        const t=e.touches[0];
        const el2=document.elementFromPoint(t.clientX,t.clientY);
        if(el2&&el2.dataset.r!==undefined)applyCell(parseInt(el2.dataset.r),parseInt(el2.dataset.c),false);
      },{passive:false});
      cell.addEventListener('touchend',()=>{touching=false;touchAction=null;});
      // mouse fallback
      cell.addEventListener('mousedown',e=>{e.preventDefault();touching=true;applyCell(r,c,true);});
      cell.addEventListener('mouseover',()=>{if(touching)applyCell(r,c,false);});

      gc.appendChild(cell);renderCell(r,c,false);
    }
  }
  updateClueStates();
}
document.addEventListener('mouseup',()=>{touching=false;touchAction=null;});

function cellPixelArtColor(r,c){
  const p=pd(),pidx=ps().current;
  const pats=PACK_PAT[p.id];
  if(pats&&pats[pidx])return p.pal[pats[pidx][r*15+c]];
  return tileColor(p,pidx,true,r,c);
}

function cellFillColor(r,c){
  const pu=puzz();
  if(pu.solved) return cellPixelArtColor(r,c);
  return '#f5a623'; // amber while unsolved
}

function renderCell(r,c,animate){
  const el=document.getElementById(`c-${r}-${c}`);if(!el)return;
  const pu=puzz();
  const v=pu.player[r][c];
  const solved=pu.solved;
  el.dataset.r=r;el.dataset.c=c;

  if(solved){
    // show every cell in its pixel art colour regardless of fill state
    const col=cellPixelArtColor(r,c);
    el.className='cell filled mural-col';
    if((c+1)%5===0&&c<14)el.classList.add('fbr');
    if((r+1)%5===0&&r<14)el.classList.add('fbb');
    el.style.background=col;
    el.style.borderColor=col;
    if(animate){el.classList.add('reveal');setTimeout(()=>el.classList.remove('reveal'),350);}
  }else{
    el.className='cell'+(v===1?' filled':v===2?' marked':'');
    if((c+1)%5===0&&c<14)el.classList.add('fbr');
    if((r+1)%5===0&&r<14)el.classList.add('fbb');
    if(v===1){
      el.style.background='#f5a623';
      el.style.borderColor='#c47d0a';
      if(animate){el.classList.add('reveal');setTimeout(()=>el.classList.remove('reveal'),350);}
    }else{
      el.style.background='';
      el.style.borderColor='';
    }
  }
}

function renderAllCells(animate){
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)renderCell(r,c,animate);
}

function hlRow(r){
  document.querySelectorAll('.cell').forEach(el=>{el.style.outline=parseInt(el.dataset.r)===r?'1px solid #4ecdc4':'';});
  const cl=puzz().clues;
  document.getElementById('hint-box').textContent=`Row ${r+1}: [${cl.rows[r].join(', ')}] — ${cl.rows[r].reduce((a,b)=>a+b,0)} filled`;
}
function hlCol(c){
  document.querySelectorAll('.cell').forEach(el=>{el.style.outline=parseInt(el.dataset.c)===c?'1px solid #4ecdc4':'';});
  const cl=puzz().clues;
  document.getElementById('hint-box').textContent=`Col ${c+1}: [${cl.cols[c].join(', ')}] — ${cl.cols[c].reduce((a,b)=>a+b,0)} filled`;
}

/* ── mural ── */
function renderMural(){
  const p=pd(),st=ps();
  const total=p.dim*p.dim,done=st.puzzles.filter(x=>x.solved).length;
  const pct=Math.round(done/total*100);
  document.getElementById('mural-stat').textContent=`${done} / ${total} puzzles · ${pct}%`;
  document.getElementById('pb').style.width=pct+'%';

  const mg=document.getElementById('mural-grid-small');
  const cellSz=Math.min(20,Math.floor(100/p.dim));
  mg.style.cssText=`display:grid;grid-template-columns:repeat(${p.dim},${cellSz}px);gap:1px;width:${p.dim*cellSz+(p.dim-1)}px`;
  mg.innerHTML='';
  for(let i=0;i<total;i++){
    const pu=st.puzzles[i];
    const cell=document.createElement('div');
    cell.className='mc'+(pu.solved?' solved':' locked');
    if(i===st.current)cell.classList.add('active-p');
    cell.style.height=cellSz+'px';
    cell.addEventListener('click',()=>selectPuzzle(i));
    if(pu.solved){
      const cv=document.createElement('canvas');cv.width=15;cv.height=15;
      cv.style.cssText='width:100%;height:100%;image-rendering:pixelated;display:block';
      const ctx=cv.getContext('2d');
      const pats=PACK_PAT[p.id];
      for(let r=0;r<15;r++)for(let c=0;c<15;c++){
        const col=pats&&pats[i]?p.pal[pats[i][r*15+c]]:tileColor(p,i,pu.pat[r][c]===1,r,c);
        ctx.fillStyle=col;ctx.fillRect(c,r,1,1);
      }
      cell.appendChild(cv);
    }else if(i===st.current){
      const dot=document.createElement('div');
      dot.style.cssText=`width:4px;height:4px;border-radius:50%;background:${p.accentLight}`;
      cell.appendChild(dot);
    }
    mg.appendChild(cell);
  }
}

function updateStats(){
  renderMural();
  const allTotal=Object.values(G.packs).reduce((a,pk)=>a+pk.puzzles.filter(x=>x.solved).length,0);
}

function pickNextPuzzle(){
  const st=ps();
  const next=st.puzzles.findIndex(p=>!p.solved);
  if(next>=0){st.current=next;renderPuzzle();renderMural();saveG();}
}

function selectPuzzle(i){
  ps().current=i;
  renderPuzzle();renderMural();
  // hide/show controls based on solved state
  const solved=puzz().solved;
  document.getElementById('controls-row').style.opacity=solved?'0.35':'1';
  document.getElementById('controls-row').style.pointerEvents=solved?'none':'auto';
  saveG();
}

function clearPuzzle(){
  puzz().player=Array.from({length:GRID},()=>Array(GRID).fill(0));
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)renderCell(r,c,false);
  saveG();updateClueStates();
}

let hintType='row';

function openHint(){
  if(puzz().solved)return;
  hintType='row';
  document.getElementById('hbtn-row').className='hint-type-btn selected';
  document.getElementById('hbtn-col').className='hint-type-btn';
  buildHintPicker();
  document.getElementById('hint-overlay').classList.add('show');
}

function closeHint(e){
  if(e&&e.target!==document.getElementById('hint-overlay'))return;
  document.getElementById('hint-overlay').classList.remove('show');
}

function setHintType(t){
  hintType=t;
  document.getElementById('hbtn-row').className='hint-type-btn'+(t==='row'?' selected':'');
  document.getElementById('hbtn-col').className='hint-type-btn'+(t==='col'?' selected':'');
  buildHintPicker();
}

function buildHintPicker(){
  const pu=puzz(),cl=pu.clues,picker=document.getElementById('hint-picker');
  picker.innerHTML='';
  const count=15;
  for(let i=0;i<count;i++){
    const clueArr=hintType==='row'?cl.rows[i]:cl.cols[i];
    // check if already fully correct
    let alreadyDone=true;
    if(hintType==='row'){
      for(let c=0;c<GRID;c++)if((pu.player[i][c]===1)!==(pu.pat[i][c]===1)){alreadyDone=false;break;}
    }else{
      for(let r=0;r<GRID;r++)if((pu.player[r][i]===1)!==(pu.pat[r][i]===1)){alreadyDone=false;break;}
    }
    const btn=document.createElement('div');
    btn.className='hint-pick-btn'+(alreadyDone?' already':'');
    const label=document.createElement('span');
    label.textContent=(hintType==='row'?'Row ':'Col ')+( i+1)+(alreadyDone?' ✓':'');
    const clueSpan=document.createElement('span');
    clueSpan.className='hclue';
    clueSpan.textContent='['+clueArr.join(', ')+']';
    btn.appendChild(label);btn.appendChild(clueSpan);
    if(!alreadyDone){
      btn.addEventListener('click',()=>solveRowOrCol(i));
    }
    picker.appendChild(btn);
  }
}

function solveRowOrCol(idx){
  const pu=puzz();
  if(hintType==='row'){
    for(let c=0;c<GRID;c++){pu.player[idx][c]=pu.pat[idx][c]===1?1:0;renderCell(idx,c,false);}
  }else{
    for(let r=0;r<GRID;r++){pu.player[r][idx]=pu.pat[r][idx]===1?1:0;renderCell(r,idx,false);}
  }
  saveG();updateClueStates();
  document.getElementById('hint-overlay').classList.remove('show');
}

function checkSolution(){
  const pu=puzz();
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if((pu.player[r][c]===1)!==(pu.pat[r][c]===1))return false;
  return true;
}
function closeSuccess(){
  document.getElementById('soverlay').classList.remove('show');
  const st=ps(),next=st.puzzles.findIndex(p=>!p.solved);
  if(next>=0){st.current=next;renderPuzzle();renderMural();}
}

let lastKey='';
setInterval(()=>{
  if(document.getElementById('game-screen').style.display==='none')return;
  const pu=puzz();if(pu.solved)return;
  const key=pu.player.map(r=>r.join('')).join('|');
  if(key===lastKey)return;lastKey=key;
  const filled=pu.player.flat().filter(v=>v===1).length;
  const target=pu.pat.flat().filter(v=>v===1).length;
  if(filled===target&&checkSolution()){
    pu.solved=true;
    // clear X marks
    for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(pu.player[r][c]===2)pu.player[r][c]=0;
    renderAllCells(true);
    updateStats();saveG();
    // brief delay then switch to locked solved view
    setTimeout(()=>{
      renderPuzzle();renderMural();
      document.getElementById('controls-row').style.opacity='0.35';
      document.getElementById('controls-row').style.pointerEvents='none';
    },800);
    const p=pd(),st=ps();
    const done=st.puzzles.filter(x=>x.solved).length,tot=p.dim*p.dim;
    document.getElementById('stitle').textContent=done===tot?'Mural revealed!':'Puzzle complete!';
    document.getElementById('smsg').textContent=done===tot
      ?`The full "${p.name}" mural is yours!`
      :`Tile ${st.current+1} uncovered. ${tot-done} left.`;
    document.getElementById('soverlay').classList.add('show');
    lastKey='';
  }
},300);

tryLoad();PACKS.forEach((_,i)=>initPack(i));renderMenu();
</script>
